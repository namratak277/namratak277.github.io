backend:
  name: github
  repo: namratak277/namratak277.github.io
  branch: main
  auth_type: pkce
  app_id: Ov23li2VFJUG8Ddd7Vqm

media_folder: assets/images
public_folder: assets/images

collections:

  - name: "skills"
    label: "Skills"
    files:
      - name: "skills"
        label: "Skills"
        file: "assets/data/skills.json"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            fields:
              - {label: "Category Name", name: "category", widget: "string"}
              - {label: "Icon", name: "icon", widget: "string", hint: "Font Awesome class — e.g. fas fa-code"}
              - label: "Skills"
                name: "skills"
                widget: "list"
                fields:
                  - {label: "Skill Name", name: "name", widget: "string"}
                  - {label: "Proficiency %", name: "proficiency", widget: "number", value_type: "int", min: 0, max: 100}

  - name: "experience"
    label: "Experience"
    files:
      - name: "experience"
        label: "Experience"
        file: "assets/data/experience.json"
        fields:
          - label: "Jobs"
            name: "jobs"
            widget: "list"
            fields:
              - {label: "Job Title", name: "title", widget: "string"}
              - {label: "Organization", name: "org", widget: "string"}
              - {label: "Dates", name: "dates", widget: "string", hint: "e.g. Apr 2024 - Present"}
              - {label: "One-line Summary", name: "summary", widget: "text"}
              - label: "Bullet Points"
                name: "details"
                widget: "list"
                field: {label: "Detail", name: "detail", widget: "string"}
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: {label: "Tag", name: "tag", widget: "string"}

  - name: "interests"
    label: "Interests"
    files:
      - name: "interests"
        label: "Interests"
        file: "assets/data/interests.json"
        fields:
          - label: "Interest Cards"
            name: "interests"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Icon", name: "icon", widget: "string", hint: "Font Awesome class — e.g. fas fa-record-vinyl"}
              - {label: "Description", name: "description", widget: "text"}
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: {label: "Tag", name: "tag", widget: "string"}
              - {label: "Filter Categories", name: "data_tags", widget: "string", hint: "Comma-separated — e.g. arts,performance"}

  - name: "projects"
    label: "Projects"
    files:
      - name: "projects"
        label: "Projects"
        file: "assets/data/projects.json"
        fields:
          - label: "Capstone Project"
            name: "capstone"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "string"}
              - {label: "Status Badge", name: "status", widget: "string", hint: "e.g. In Progress"}
              - {label: "Deadline", name: "deadline", widget: "string", hint: "e.g. Dec 2026"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Phase Description", name: "phase_description", widget: "text"}
              - label: "Tech Stack"
                name: "stack"
                widget: "list"
                field: {label: "Technology", name: "tech", widget: "string"}
              - label: "Progress Steps"
                name: "progress"
                widget: "list"
                fields:
                  - {label: "Step Label", name: "label", widget: "string"}
                  - label: "State"
                    name: "state"
                    widget: "select"
                    options: ["", "active", "done"]
                    default: ""
              - {label: "GitHub URL", name: "github", widget: "string"}
          - label: "Other Projects"
            name: "projects"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Icon", name: "icon", widget: "string", hint: "Font Awesome class — e.g. fas fa-store"}
              - {label: "Project Type", name: "type", widget: "string", hint: "e.g. Full-Stack Web App"}
              - {label: "Featured (shows larger)", name: "featured", widget: "boolean", default: false}
              - {label: "Description", name: "description", widget: "text"}
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: {label: "Tag", name: "tag", widget: "string"}
              - {label: "GitHub URL", name: "github", widget: "string"}

  - name: "posts"
    label: "Blog Posts"
    files:
      - name: "posts"
        label: "Posts"
        file: "assets/data/posts.json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Slug (URL key)", name: "slug", widget: "string", hint: "URL-friendly — e.g. my-post-title"}
              - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false}
              - {label: "Category", name: "category", widget: "string"}
              - {label: "Read Time", name: "readTime", widget: "string", hint: "e.g. 5 min"}
              - {label: "Excerpt (short summary)", name: "excerpt", widget: "text"}
              - {label: "Content", name: "content", widget: "markdown"}
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: {label: "Tag", name: "tag", widget: "string"}
